# Repo-local (NOT synced from cplieger/ci): runtime smoke test for the image.
# The central `ci / validate` gate checks the Dockerfile *builds*; this proves
# the built image actually *serves* — /healthz, the UI scaffold, the WebSocket
# route, and Basic-auth gating — via scripts/smoke.sh. Kept separate from the
# synced CI template so a future sync can't clobber it.
name: Smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build image
        run: docker build -t web-terminal-server:smoke .

      - name: Run smoke test
        run: scripts/smoke.sh web-terminal-server:smoke
